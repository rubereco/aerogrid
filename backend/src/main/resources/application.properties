# Application name
spring.application.name=aerogrid

# PostgreSQL database connection
spring.datasource.url=jdbc:postgresql://localhost:5432/aerogrid
spring.datasource.username=${AEROGRID_DB_USERNAME}
spring.datasource.password=${AEROGRID_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA configuration / Hibernate Spatial
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

gencat.api.url=https://analisi.transparenciacatalunya.cat/resource
gencat.api.token=${AEROGRID_API_TOKEN_GENCAT}
gencat.api.air-quality-dataset-id=/tasf-thgu.json

# SECURITY PROPERTIES
# Secret key used to sign JWT tokens. Must be at least 256 bits in Base64 or Hex.
application.security.jwt.secret-key=${AEROGRID_JWT_SECRET_KEY}
# Expiration time in milliseconds (ex: 86400000 = 24 hours)
application.security.jwt.expiration=86400000

# Logging configuration to reduce noise from Hibernate SQL statements
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=OFF
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

## Uncomment the following lines to enable SQL logging for debugging purposes
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
