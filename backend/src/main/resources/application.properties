# Application name
spring.application.name=aerogrid

# PostgreSQL database connection
spring.datasource.url=jdbc:postgresql://localhost:5432/aerogrid
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA configuration / Hibernate Spatial
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

gencat.api.url=https://analisi.transparenciacatalunya.cat/resource
gencat.api.token=${API_TOKEN_GENCAT:QzhrI2RetGHo34K2QhHlOr7Xk}

# SECURITY PROPERTIES
# Secret key utilitzada per signar els tokens JWT. Ha de ser com a mínim de 256 bits en Base64 o Hex.
application.security.jwt.secret-key=${JWT_SECRET_KEY:6800a00c8f74d7df793a05182727ec1f132656b99dfbf5541f5b4903cee61420aff3162fdb3d1523006cc11756dbe0d582f465d3f60ea476af7144a40eb9877a}
# Temps d'expiració en mil·lisegons (ex: 86400000 = 24 hores)
application.security.jwt.expiration=86400000

# Logging configuration to reduce noise from Hibernate SQL statements
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=OFF
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

## Uncomment the following lines to enable SQL logging for debugging purposes
